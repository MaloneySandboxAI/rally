name: Supabase keep-alive

# Pings the Rally AI Supabase project on a schedule so it doesn't
# get auto-paused by the free tier's 7-day inactivity rule.
#
# Runs every Monday and Thursday at 14:00 UTC (≈9am ET / 6am PT),
# which keeps the gap well under 7 days even if one run fails.
# Also supports manual triggering from the Actions tab.

on:
  schedule:
    - cron: '0 14 * * 1,4'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (auth/settings endpoint, anon-key accessible)
        env:
          SUPABASE_URL: https://rmbzpxvsejbugsgflqsv.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/settings")
          echo "$response"
          code=$(echo "$response" | tail -n1 | sed 's/HTTP_CODE://')
          if [ "$code" -ge 400 ]; then
            echo "::error::Supabase ping failed with HTTP $code"
            exit 1
          fi
          echo "Supabase ping succeeded (HTTP $code)"
